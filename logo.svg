<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="200" fill="#000000"/>
  
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <rect x="50" y="60" width="80" height="80" rx="18" fill="none" stroke="#FF57A0" stroke-width="6"/>
    <line x1="72" y1="100" x2="108" y2="100" stroke="#FF57A0" stroke-width="6" stroke-linecap="round"/>
    <line x1="90" y1="82" x2="90" y2="118" stroke="#FF57A0" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="160" y="118" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="58" fill="#FFFFFF" letter-spacing="-1">neuralbroker</text>
</svg>
